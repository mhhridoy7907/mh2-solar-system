<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH2 Solar System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:Arial;}
canvas{display:block;}

#info{
position:fixed;
top:20px;
left:20px;
z-index:100;
color:white;
padding:15px 20px;
border-radius:20px;
background:rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

#info h1{color:#00ffff;margin-bottom:10px;}
#info p{color:#aaa;line-height:1.7;font-size:12px;}

.planet-label{
position:fixed;
color:#fff;
font-size:13px;
font-weight:bold;
text-shadow:0 0 6px rgba(0,255,255,0.9), 0 0 2px #000;
pointer-events:none;
transform:translate(-50%,-50%);
white-space:nowrap;
letter-spacing:1px;
z-index:50;
}

#planetPanel{
position:fixed;
top:50%;
right:30px;
transform:translateY(-50%) translateX(30px);
width:300px;
padding:22px 24px;
border-radius:22px;
background:rgba(10,20,30,0.35);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
color:#fff;
box-shadow:0 8px 32px rgba(0,0,0,0.5);
z-index:200;
opacity:0;
pointer-events:none;
transition:opacity 0.4s ease, transform 0.4s ease;
}
#planetPanel.visible{
opacity:1;
pointer-events:auto;
transform:translateY(-50%) translateX(0);
}
#planetPanel h2{
color:#00ffff;
margin-bottom:12px;
font-size:22px;
letter-spacing:1px;
}
#planetPanel p{
color:#cfd8dc;
line-height:1.6;
font-size:14px;
margin-bottom:6px;
}
#planetPanel .label{
color:#7fdfff;
font-weight:bold;
}
#planetPanel .closeBtn{
position:absolute;
top:14px;
right:16px;
background:none;
border:none;
color:#fff;
font-size:18px;
cursor:pointer;
opacity:0.7;
}
#planetPanel .closeBtn:hover{opacity:1;}

#controlsPanel{
position:fixed;
bottom:20px;
left:20px;
z-index:150;
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.glassBtn{
padding:10px 18px;
border-radius:14px;
background:rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
color:#fff;
font-family:Arial;
font-size:13px;
cursor:pointer;
transition:background 0.2s ease, transform 0.15s ease;
}
.glassBtn:hover{
background:rgba(0,255,255,0.15);
transform:translateY(-2px);
}
.glassBtn.active{
background:rgba(0,255,255,0.3);
border-color:#00ffff;
}

#fpsCounter{
position:fixed;
top:20px;
right:20px;
z-index:150;
color:#0f0;
font-family:monospace;
font-size:13px;
background:rgba(0,0,0,0.5);
padding:8px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
}

#loadingScreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:#000;
z-index:999;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:#00ffff;
font-family:Arial;
transition:opacity 0.8s ease;
}
#loadingScreen h2{
font-size:26px;
letter-spacing:3px;
margin-bottom:20px;
}
#loadingBarOuter{
width:320px;
height:14px;
border:1px solid rgba(0,255,255,0.4);
border-radius:10px;
overflow:hidden;
background:rgba(255,255,255,0.05);
}
#loadingBarInner{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffff,#0077ff);
transition:width 0.2s ease;
}
#loadingPercent{
margin-top:12px;
font-size:14px;
color:#aaa;
}
</style>
</head>

<body>

<div id="loadingScreen">
<h2>LOADING...</h2>
<div id="loadingBarOuter"><div id="loadingBarInner"></div></div>
<div id="loadingPercent">0%</div>
</div>

<div id="info">
<h1>MH2 SOLAR SYSTEM </h1>
<p><strong>CONTROLS:</strong> Drag mouse to look | WASD to move | Arrow keys to turn/strafe</p>
<p>Scroll to zoom | Double-click planet to zoom in | Click for info</p>
</div>

<div id="fpsCounter">FPS: 0</div>

<div id="planetPanel">
<button class="closeBtn" id="planetPanelClose">✕</button>
<h2 id="ppName">Planet</h2>
<p><span class="label">Radius:</span> <span id="ppRadius"></span></p>
<p><span class="label">Distance from Sun:</span> <span id="ppDistance"></span></p>
<p><span class="label">Moons:</span> <span id="ppMoons"></span></p>
<p><span class="label">Fact:</span> <span id="ppFact"></span></p>
</div>

<div id="labelContainer"></div>

<div id="controlsPanel">
<button class="glassBtn" id="autoTourBtn">🚀 Auto </button>
<button class="glassBtn" id="soundBtn">🔇 </button>
</div>

<audio id="spaceSound" loop preload="none">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b8a13d29.mp3?filename=space-ambience-15477.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/geometries/TextGeometry.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/objects/Lensflare.js"></script>

<script src="script.js"></script>

</body>
</html>
