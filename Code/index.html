<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH2 hridoy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
cursor:crosshair;
}

canvas{
display:block;
}

/* ================= HUD ================= */

.hud{
position:fixed;
top:20px;
left:20px;
z-index:10;

color:#7df9ff;
font-size:14px;
letter-spacing:3px;

text-shadow:
0 0 5px #00ffff,
0 0 20px #00ffff;

pointer-events:none;
}

/* ================= CROSSHAIR ================= */

.crosshair{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:18px;
height:18px;
pointer-events:none;
z-index:10;
}

.crosshair::before,
.crosshair::after{

content:"";
position:absolute;

background:#00ffff;

box-shadow:0 0 10px #00ffff;

}

.crosshair::before{
width:18px;
height:2px;
top:8px;
left:0;
}

.crosshair::after{
width:2px;
height:18px;
left:8px;
top:0;
}

</style>
</head>

<body>

<div class="hud">
MH2 HRIDOY</div>

<div class="crosshair"></div>

<!-- ================= THREE JS ================= -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<!-- ================= FONT LOADER ================= -->

<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/loaders/FontLoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/geometries/TextGeometry.js"></script>

<!-- ================= GLTF LOADER ================= -->

<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/loaders/GLTFLoader.js"></script>


<script src="f.js"></script>
</body>
</html>
